<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>开心消消乐</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(160deg, #ff9a9e 0%, #fecfef 40%, #a1c4fd 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 12px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    overflow: hidden;
  }
  h1 {
    color: #fff;
    font-size: 30px;
    text-shadow: 0 3px 8px rgba(0,0,0,.25);
    letter-spacing: 4px;
  }
  .hud {
    display: flex;
    gap: 10px;
    width: min(92vmin, 520px);
  }
  .hud .box {
    flex: 1;
    background: rgba(255,255,255,.85);
    border-radius: 14px;
    padding: 6px 4px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,.12);
  }
  .hud .label { font-size: 12px; color: #888; }
  .hud .value { font-size: 20px; font-weight: bold; color: #ff6b6b; }
  .progress {
    width: min(92vmin, 520px);
    height: 12px;
    background: rgba(255,255,255,.5);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.15);
  }
  .progress .bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ffd93d, #ff6b6b);
    border-radius: 6px;
    transition: width .4s ease;
  }
  #board {
    position: relative;
    width: min(92vmin, 520px);
    aspect-ratio: 1 / 1;
    background: rgba(255,255,255,.35);
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,.2);
    overflow: hidden;
  }
  .tile {
    position: absolute;
    top: 0; left: 0;
    width: 12.5%;
    height: 12.5%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .28s cubic-bezier(.34,1.3,.64,1);
    cursor: pointer;
  }
  .tile .inner {
    width: 86%;
    height: 86%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: min(7.2vmin, 40px);
    background: rgba(255,255,255,.9);
    border-radius: 22%;
    box-shadow: 0 3px 6px rgba(0,0,0,.15);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .tile.selected .inner {
    transform: scale(1.12);
    box-shadow: 0 0 0 3px #ffd93d, 0 4px 12px rgba(0,0,0,.3);
    animation: wobble .5s ease infinite alternate;
  }
  @keyframes wobble {
    from { transform: scale(1.12) rotate(-6deg); }
    to   { transform: scale(1.12) rotate(6deg); }
  }
  .tile .inner.pop {
    animation: pop .3s ease forwards;
  }
  @keyframes pop {
    40% { transform: scale(1.25); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
  }
  #combo {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 42px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 2px 6px rgba(255,107,107,.9);
    pointer-events: none;
    opacity: 0;
    z-index: 5;
  }
  #combo.show { animation: comboFly .8s ease forwards; }
  @keyframes comboFly {
    0%   { opacity: 0; transform: translate(-50%,-30%) scale(.5); }
    30%  { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
    70%  { opacity: 1; transform: translate(-50%,-60%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-90%) scale(1); }
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .overlay.show { display: flex; }
  .overlay .panel {
    background: #fff;
    border-radius: 20px;
    padding: 32px 44px;
    text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,.3);
    animation: panelIn .35s cubic-bezier(.34,1.4,.64,1);
  }
  @keyframes panelIn {
    from { transform: scale(.6); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .overlay .panel h2 { font-size: 28px; color: #ff6b6b; margin-bottom: 10px; }
  .overlay .panel p { color: #666; margin-bottom: 20px; font-size: 15px; }
  .overlay .panel button {
    font-size: 18px;
    padding: 10px 34px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(90deg, #ff6b6b, #ffa06b);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(255,107,107,.5);
    font-family: inherit;
  }
  .overlay .panel button:active { transform: scale(.95); }

  /* 难度设置面板 */
  .presets { display: flex; gap: 8px; justify-content: center; margin-bottom: 18px; }
  .overlay .panel button.preset {
    flex: 1;
    font-size: 15px;
    padding: 8px 14px;
    background: #f1f2f6;
    color: #666;
    box-shadow: none;
    border: 2px solid transparent;
  }
  .overlay .panel button.preset.active {
    background: #fff2f2;
    color: #ff6b6b;
    border-color: #ff6b6b;
    font-weight: bold;
  }
  .opt-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 12px;
  }
  .opt-row label { color: #666; font-size: 15px; }
  .opt-row select {
    font-size: 15px;
    font-family: inherit;
    padding: 6px 12px;
    border: 2px solid #eee;
    border-radius: 10px;
    background: #fafafa;
    color: #ff6b6b;
    font-weight: bold;
    outline: none;
    cursor: pointer;
  }
  .overlay .panel button.start { margin-top: 10px; width: 100%; }

  .tip {
    color: rgba(255,255,255,.9);
    font-size: 13px;
    text-shadow: 0 1px 3px rgba(0,0,0,.2);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #diffBtn {
    font-size: 13px;
    font-family: inherit;
    padding: 4px 14px;
    border: none;
    border-radius: 999px;
    background: rgba(255,255,255,.85);
    color: #ff6b6b;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,.15);
  }
  #diffBtn:active { transform: scale(.95); }
</style>
</head>
<body>
  <h1>🍭 开心消消乐 🍭</h1>
  <div class="hud">
    <div class="box"><div class="label">关卡</div><div class="value" id="level">1</div></div>
    <div class="box"><div class="label">得分</div><div class="value" id="score">0</div></div>
    <div class="box"><div class="label">目标</div><div class="value" id="target">1500</div></div>
    <div class="box"><div class="label">步数</div><div class="value" id="moves">30</div></div>
  </div>
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div id="board">
    <div id="combo"></div>
  </div>
  <div class="tip">
    <span>点击或滑动交换相邻的小动物，凑齐 3 个即可消除</span>
    <button id="diffBtn">⚙️ 难度</button>
  </div>

  <div id="overlay" class="overlay">
    <div class="panel">
      <h2 id="ovTitle"></h2>
      <p id="ovText"></p>
      <button id="ovBtn"></button>
    </div>
  </div>

  <div id="settings" class="overlay show">
    <div class="panel">
      <h2>🎮 难度设置</h2>
      <div class="presets">
        <button class="preset" data-preset="easy">😊 简单</button>
        <button class="preset active" data-preset="normal">🙂 普通</button>
        <button class="preset" data-preset="hard">😈 困难</button>
      </div>
      <div class="opt-row">
        <label>每关步数</label>
        <select id="optMoves">
          <option value="20">20 步</option>
          <option value="25">25 步</option>
          <option value="30" selected>30 步</option>
          <option value="35">35 步</option>
          <option value="40">40 步</option>
          <option value="50">50 步</option>
        </select>
      </div>
      <div class="opt-row">
        <label>目标分数</label>
        <select id="optTarget">
          <option value="1000">1000 分</option>
          <option value="1200">1200 分</option>
          <option value="1500" selected>1500 分</option>
          <option value="2000">2000 分</option>
          <option value="2500">2500 分</option>
          <option value="3000">3000 分</option>
        </select>
      </div>
      <div class="opt-row">
        <label>动物种类</label>
        <select id="optTypes">
          <option value="4">4 种（最简单）</option>
          <option value="5">5 种</option>
          <option value="6" selected>6 种</option>
          <option value="7">7 种</option>
          <option value="8">8 种（最难）</option>
        </select>
      </div>
      <button class="start" id="startBtn">开始游戏</button>
    </div>
  </div>

<script>
(function () {
  'use strict';

  const ROWS = 8, COLS = 8;
  const ALL_TYPES = ['🐱', '🐶', '🦊', '🐸', '🐼', '🐵', '🐰', '🐷'];
  const PRESETS = {
    easy:   { moves: 40, target: 1200, types: 5 },
    normal: { moves: 30, target: 1500, types: 6 },
    hard:   { moves: 25, target: 2000, types: 7 },
  };

  const settings = { ...PRESETS.normal };
  let TYPES = ALL_TYPES.slice(0, settings.types);

  const boardEl = document.getElementById('board');
  const comboEl = document.getElementById('combo');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ovTitle');
  const ovText = document.getElementById('ovText');
  const ovBtn = document.getElementById('ovBtn');
  const ui = {
    level: document.getElementById('level'),
    score: document.getElementById('score'),
    target: document.getElementById('target'),
    moves: document.getElementById('moves'),
    bar: document.getElementById('bar'),
  };

  let grid = [];          // grid[r][c] -> tile 或 null
  let score = 0, level = 1, target = settings.target, moves = settings.moves;
  let busy = false;       // 动画期间锁定输入
  let selected = null;
  let drag = null;        // { tile, x, y }

  const sleep = ms => new Promise(res => setTimeout(res, ms));
  const randType = () => TYPES[(Math.random() * TYPES.length) | 0];

  /* ---------- 音效 ---------- */
  let audioCtx = null;
  function playTone(freq, dur = 0.12, type = 'sine', vol = 0.15) {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + dur);
    } catch (e) { /* 忽略音频错误 */ }
  }
  const sndSwap = () => playTone(300, 0.08, 'triangle');
  const sndPop = chain => playTone(400 + chain * 120, 0.15, 'sine', 0.2);
  const sndBad = () => playTone(160, 0.15, 'sawtooth', 0.08);
  const sndWin = () => { playTone(523, 0.15); setTimeout(() => playTone(659, 0.15), 130); setTimeout(() => playTone(784, 0.3), 260); };

  /* ---------- 棋盘 ---------- */
  function setPos(tile) {
    tile.el.style.transform = 'translate(' + tile.c * 100 + '%, ' + tile.r * 100 + '%)';
  }

  function createTile(r, c, type) {
    const el = document.createElement('div');
    el.className = 'tile';
    const inner = document.createElement('span');
    inner.className = 'inner';
    inner.textContent = type;
    el.appendChild(inner);
    const tile = { r, c, type, el, inner };
    el.addEventListener('pointerdown', e => onPointerDown(e, tile));
    setPos(tile);
    boardEl.appendChild(el);
    return tile;
  }

  // 生成初始棋盘，避免开局就有三连
  function fillBoard() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      grid.push(new Array(COLS).fill(null));
      for (let c = 0; c < COLS; c++) {
        let type;
        do { type = randType(); }
        while (
          (c >= 2 && grid[r][c - 1].type === type && grid[r][c - 2].type === type) ||
          (r >= 2 && grid[r - 1][c].type === type && grid[r - 2][c].type === type)
        );
        grid[r][c] = createTile(r, c, type);
      }
    }
  }

  function clearBoard() {
    for (const row of grid) for (const t of row) if (t) t.el.remove();
    grid = [];
  }

  /* ---------- 匹配检测 ---------- */
  function findMatches() {
    const matched = new Set();
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const t = grid[r][c];
        if (!t) continue;
        // 横向
        if (c <= COLS - 3 && grid[r][c + 1] && grid[r][c + 2] &&
            grid[r][c + 1].type === t.type && grid[r][c + 2].type === t.type) {
          let k = c;
          while (k < COLS && grid[r][k] && grid[r][k].type === t.type) matched.add(grid[r][k++]);
        }
        // 纵向
        if (r <= ROWS - 3 && grid[r + 1][c] && grid[r + 2][c] &&
            grid[r + 1][c].type === t.type && grid[r + 2][c].type === t.type) {
          let k = r;
          while (k < ROWS && grid[k][c] && grid[k][c].type === t.type) matched.add(grid[k++][c]);
        }
      }
    }
    return matched;
  }

  // 判断当前是否还存在可消除的走法（用类型矩阵模拟交换）
  function hasMoves() {
    const types = grid.map(row => row.map(t => t.type));
    const matchAt = (r, c) => {
      const t = types[r][c];
      let n = 1;
      for (let k = c - 1; k >= 0 && types[r][k] === t; k--) n++;
      for (let k = c + 1; k < COLS && types[r][k] === t; k++) n++;
      if (n >= 3) return true;
      n = 1;
      for (let k = r - 1; k >= 0 && types[k][c] === t; k--) n++;
      for (let k = r + 1; k < ROWS && types[k][c] === t; k++) n++;
      return n >= 3;
    };
    const trySwap = (r1, c1, r2, c2) => {
      const a = types[r1][c1];
      types[r1][c1] = types[r2][c2];
      types[r2][c2] = a;
      const ok = matchAt(r1, c1) || matchAt(r2, c2);
      types[r2][c2] = types[r1][c1];
      types[r1][c1] = a;
      return ok;
    };
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (c + 1 < COLS && trySwap(r, c, r, c + 1)) return true;
        if (r + 1 < ROWS && trySwap(r, c, r + 1, c)) return true;
      }
    }
    return false;
  }

  /* ---------- 消除与下落 ---------- */
  async function resolveMatches() {
    let chain = 0;
    while (true) {
      const matched = findMatches();
      if (matched.size === 0) break;
      chain++;

      let gain = matched.size * 10 * chain;
      if (matched.size > 3) gain += (matched.size - 3) * 20;
      score += gain;
      updateUI();
      sndPop(chain);
      if (chain > 1) showCombo(chain);

      for (const t of matched) {
        grid[t.r][t.c] = null;
        t.inner.classList.add('pop');
      }
      await sleep(300);
      for (const t of matched) t.el.remove();

      // 下落 + 顶部补新块
      for (let c = 0; c < COLS; c++) {
        const stack = [];
        for (let r = ROWS - 1; r >= 0; r--) if (grid[r][c]) stack.push(grid[r][c]);
        const missing = ROWS - stack.length;
        for (let i = 0; i < stack.length; i++) {
          const t = stack[i];
          t.r = ROWS - 1 - i;
          grid[t.r][c] = t;
          setPos(t);
        }
        for (let i = 0; i < missing; i++) {
          const r = missing - 1 - i;
          const t = createTile(-(i + 1), c, randType());
          grid[r][c] = t;
          t.r = r;
          // 强制回流，让下落有过渡动画
          void t.el.offsetWidth;
          setPos(t);
        }
      }
      await sleep(340);
    }
    return chain;
  }

  function showCombo(chain) {
    comboEl.textContent = '连击 x' + chain + '!';
    comboEl.classList.remove('show');
    void comboEl.offsetWidth;
    comboEl.classList.add('show');
  }

  /* ---------- 交换 ---------- */
  async function attemptSwap(a, b) {
    if (busy) return;
    busy = true;
    setSelected(null);
    sndSwap();

    swapTiles(a, b);
    await sleep(300);

    if (findMatches().size === 0) {
      swapTiles(a, b); // 换回去
      sndBad();
      await sleep(300);
      busy = false;
      return;
    }

    moves--;
    updateUI();
    await resolveMatches();

    if (!hasMoves()) {
      await reshuffle();
    }
    busy = false;
    checkEnd();
  }

  function swapTiles(a, b) {
    grid[a.r][a.c] = b;
    grid[b.r][b.c] = a;
    const r = a.r, c = a.c;
    a.r = b.r; a.c = b.c;
    b.r = r; b.c = c;
    setPos(a);
    setPos(b);
  }

  async function reshuffle() {
    showCombo(0);
    comboEl.textContent = '无可消除，洗牌！';
    await sleep(800);
    clearBoard();
    fillBoard();
    if (!hasMoves()) return reshuffle();
  }

  /* ---------- 输入 ---------- */
  function setSelected(tile) {
    if (selected) selected.el.classList.remove('selected');
    selected = tile;
    if (selected) selected.el.classList.add('selected');
  }

  function isAdjacent(a, b) {
    return Math.abs(a.r - b.r) + Math.abs(a.c - b.c) === 1;
  }

  function onPointerDown(e, tile) {
    if (busy) return;
    e.preventDefault();
    drag = { tile, x: e.clientX, y: e.clientY };
  }

  window.addEventListener('pointerup', e => {
    if (!drag || busy) { drag = null; return; }
    const { tile, x, y } = drag;
    drag = null;
    const dx = e.clientX - x, dy = e.clientY - y;

    // 滑动交换
    if (Math.hypot(dx, dy) > 24) {
      let r = tile.r, c = tile.c;
      if (Math.abs(dx) > Math.abs(dy)) c += dx > 0 ? 1 : -1;
      else r += dy > 0 ? 1 : -1;
      if (r >= 0 && r < ROWS && c >= 0 && c < COLS) attemptSwap(tile, grid[r][c]);
      return;
    }

    // 点击选择/交换
    if (!selected) { setSelected(tile); return; }
    if (selected === tile) { setSelected(null); return; }
    if (isAdjacent(selected, tile)) attemptSwap(selected, tile);
    else setSelected(tile);
  });

  /* ---------- 流程 ---------- */
  function updateUI() {
    ui.level.textContent = level;
    ui.score.textContent = score;
    ui.target.textContent = target;
    ui.moves.textContent = moves;
    ui.bar.style.width = Math.min(100, score / target * 100) + '%';
  }

  function newGame() {
    score = 0;
    level = 1;
    target = settings.target;
    moves = settings.moves;
    setSelected(null);
    clearBoard();
    fillBoard();
    while (!hasMoves()) { clearBoard(); fillBoard(); }
    updateUI();
  }

  function checkEnd() {
    if (score >= target) {
      sndWin();
      showOverlay('🎉 过关啦！', '第 ' + level + ' 关完成，得分 ' + score, '下一关', () => {
        level++;
        target += settings.target + level * 500;
        moves = settings.moves;
        clearBoard();
        fillBoard();
        while (!hasMoves()) { clearBoard(); fillBoard(); }
        updateUI();
      });
    } else if (moves <= 0) {
      sndBad();
      showOverlay('😢 步数用完了', '最终得分 ' + score + '，差一点点，再来一次吧！', '重新开始', newGame);
    }
  }

  function showOverlay(title, text, btnLabel, onClick) {
    ovTitle.textContent = title;
    ovText.textContent = text;
    ovBtn.textContent = btnLabel;
    ovBtn.onclick = () => {
      overlay.classList.remove('show');
      onClick();
    };
    overlay.classList.add('show');
  }

  /* ---------- 难度设置 ---------- */
  const settingsEl = document.getElementById('settings');
  const optMoves = document.getElementById('optMoves');
  const optTarget = document.getElementById('optTarget');
  const optTypes = document.getElementById('optTypes');
  const presetBtns = document.querySelectorAll('.preset');

  function syncPresetHighlight() {
    presetBtns.forEach(btn => {
      const p = PRESETS[btn.dataset.preset];
      btn.classList.toggle('active',
        p.moves === +optMoves.value &&
        p.target === +optTarget.value &&
        p.types === +optTypes.value);
    });
  }

  presetBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const p = PRESETS[btn.dataset.preset];
      optMoves.value = p.moves;
      optTarget.value = p.target;
      optTypes.value = p.types;
      syncPresetHighlight();
    });
  });

  [optMoves, optTarget, optTypes].forEach(sel =>
    sel.addEventListener('change', syncPresetHighlight));

  document.getElementById('startBtn').addEventListener('click', () => {
    settings.moves = +optMoves.value;
    settings.target = +optTarget.value;
    settings.types = +optTypes.value;
    TYPES = ALL_TYPES.slice(0, settings.types);
    settingsEl.classList.remove('show');
    newGame();
  });

  document.getElementById('diffBtn').addEventListener('click', () => {
    if (busy) return;
    optMoves.value = settings.moves;
    optTarget.value = settings.target;
    optTypes.value = settings.types;
    syncPresetHighlight();
    settingsEl.classList.add('show');
  });

  fillBoard();
  updateUI();
})();
</script>
</body>
</html>
